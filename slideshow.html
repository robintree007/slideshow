<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>Glowfan Slideshow</title>
<link rel="manifest" href='data:application/manifest+json,{"name":"Glowfan Slideshow","short_name":"Slideshow","start_url":".","display":"standalone","background_color":"#0a0a0a","theme_color":"#0a0a0a","icons":[{"src":"data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 192 192%22><rect width=%22192%22 height=%22192%22 fill=%22%230a0a0a%22/><circle cx=%2296%22 cy=%2296%22 r=%2240%22 fill=%22%23e8c468%22/></svg>","sizes":"192x192","type":"image/svg+xml"}]}'>
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #f4f1ea;
    --accent: #e8c468;
    --panel: rgba(15, 15, 15, 0.85);
    --border: rgba(232, 196, 104, 0.25);
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; width: 100%; overflow: hidden;
    background: var(--bg); color: var(--fg);
    font-family: 'Cormorant Garamond', 'Noto Serif KR', Georgia, serif;
    user-select: none; -webkit-user-select: none;
    overscroll-behavior: none;
  }
  body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

  /* ===== Start Screen ===== */
  #start {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; gap: 28px;
    background: radial-gradient(ellipse at top, #1a1410 0%, #0a0a0a 70%);
  }
  #start h1 {
    font-size: clamp(36px, 9vw, 56px);
    font-weight: 300; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(232, 196, 104, 0.3);
  }
  #start .subtitle {
    font-size: 13px; letter-spacing: 0.4em; text-transform: uppercase;
    opacity: 0.5; font-family: ui-sans-serif, system-ui;
    margin-top: -20px;
  }
  .panel {
    width: 100%; max-width: 420px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 4px; padding: 20px;
    backdrop-filter: blur(10px);
  }
  .panel h2 {
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
    opacity: 0.6; margin-bottom: 14px; font-family: ui-sans-serif, system-ui; font-weight: 500;
  }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 0; font-size: 14px; font-family: ui-sans-serif, system-ui; }
  .row + .row { border-top: 1px solid rgba(255,255,255,0.05); }
  .row label { opacity: 0.85; }
  input[type="range"] { flex: 1; max-width: 160px; accent-color: var(--accent); }
  select, input[type="number"] {
    background: rgba(0,0,0,0.4); color: var(--fg);
    border: 1px solid var(--border); border-radius: 3px;
    padding: 6px 10px; font-family: inherit; font-size: 13px;
    min-width: 100px;
  }
  input[type="number"] { width: 70px; min-width: auto; }

  .toggle { position: relative; width: 44px; height: 24px; background: #2a2a2a; border-radius: 12px; cursor: pointer; transition: background 0.2s; }
  .toggle.on { background: var(--accent); }
  .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
  .toggle.on::after { transform: translateX(20px); }

  .btn {
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent); border-radius: 2px;
    padding: 14px 28px; font-size: 13px; letter-spacing: 0.2em;
    text-transform: uppercase; cursor: pointer;
    font-family: ui-sans-serif, system-ui; font-weight: 500;
    transition: all 0.2s;
  }
  .btn:active { background: var(--accent); color: var(--bg); }
  .btn.primary { background: var(--accent); color: var(--bg); }
  .btn.full { width: 100%; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  #fileInput { display: none; }
  #thumbsBar {
    width: 100%; max-width: 420px;
    display: flex; gap: 6px; overflow-x: auto;
    padding: 4px 2px; scrollbar-width: none;
  }
  #thumbsBar::-webkit-scrollbar { display: none; }
  .thumb {
    flex: 0 0 60px; height: 60px; border-radius: 3px;
    background-size: cover; background-position: center;
    border: 1px solid var(--border); position: relative;
  }
  .thumb .x {
    position: absolute; top: -6px; right: -6px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--danger); color: white; font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-family: ui-sans-serif;
  }

  /* ===== Player ===== */
  #player { position: fixed; inset: 0; display: none; background: #000; }
  #player.active { display: block; }
  #stage { position: absolute; inset: 0; overflow: hidden; }
  .slide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    will-change: transform, opacity;
  }
  .slide.active { opacity: 1; pointer-events: auto; }
  .slide img {
    max-width: 100%; max-height: 100%;
    object-fit: contain; will-change: transform;
  }

  /* Transitions */
  .trans-fade .slide { transition: opacity 0.8s ease-in-out; }
  .trans-slide .slide { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s; transform: translateX(100%); }
  .trans-slide .slide.active { transform: translateX(0); }
  .trans-slide .slide.prev { transform: translateX(-100%); }

  /* Ken Burns */
  @keyframes kb1 { from { transform: scale(1) translate(0,0); } to { transform: scale(1.15) translate(-3%, -2%); } }
  @keyframes kb2 { from { transform: scale(1.15) translate(2%, 1%); } to { transform: scale(1) translate(0, 0); } }
  @keyframes kb3 { from { transform: scale(1) translate(-2%, 2%); } to { transform: scale(1.18) translate(3%, -3%); } }
  @keyframes kb4 { from { transform: scale(1.1) translate(0, -2%); } to { transform: scale(1) translate(-2%, 2%); } }
  .kb img.active-kb { animation-duration: var(--kb-dur, 5s); animation-timing-function: ease-in-out; animation-fill-mode: both; }
  .kb .slide:nth-child(4n+1) img.active-kb { animation-name: kb1; }
  .kb .slide:nth-child(4n+2) img.active-kb { animation-name: kb2; }
  .kb .slide:nth-child(4n+3) img.active-kb { animation-name: kb3; }
  .kb .slide:nth-child(4n) img.active-kb { animation-name: kb4; }

  /* Top bar */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: max(12px, env(safe-area-inset-top)) 16px 12px;
    display: flex; justify-content: space-between; align-items: center;
    background: linear-gradient(180deg, rgba(0,0,0,0.6), transparent);
    z-index: 10; transition: opacity 0.3s;
    font-family: ui-sans-serif, system-ui; font-size: 12px;
  }
  #topbar .counter { color: var(--accent); letter-spacing: 0.1em; }
  #topbar .icon-btn {
    background: transparent; border: none; color: var(--fg);
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 20px;
  }
  #topbar .icon-btn:active { background: rgba(255,255,255,0.1); }
  .auto-hide.hidden { opacity: 0; pointer-events: none; }

  /* Bottom bar */
  #bottombar {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 12px 16px max(12px, env(safe-area-inset-bottom));
    display: flex; justify-content: center; gap: 24px;
    background: linear-gradient(0deg, rgba(0,0,0,0.6), transparent);
    z-index: 10; transition: opacity 0.3s;
  }
  #bottombar .icon-btn {
    background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15);
    color: var(--fg); width: 52px; height: 52px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 22px; backdrop-filter: blur(10px);
  }
  #bottombar .icon-btn.play { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  /* Progress */
  #progress {
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px; background: rgba(255,255,255,0.1); z-index: 11;
  }
  #progressFill {
    height: 100%; background: var(--accent);
    width: 0%; transition: width 0.1s linear;
  }

  /* Recording indicator */
  #recBadge {
    position: absolute; top: 60px; right: 16px;
    background: rgba(255, 50, 50, 0.9); color: white;
    padding: 6px 12px; border-radius: 20px;
    font-size: 11px; letter-spacing: 0.15em; font-family: ui-sans-serif;
    display: none; align-items: center; gap: 6px; z-index: 12;
  }
  #recBadge.on { display: flex; }
  #recBadge::before {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
    background: white; animation: blink 1s infinite;
  }
  @keyframes blink { 50% { opacity: 0.2; } }

  /* Toast */
  #toast {
    position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%);
    background: var(--panel); border: 1px solid var(--border);
    color: var(--fg); padding: 16px 24px; border-radius: 4px;
    font-family: ui-sans-serif, system-ui; font-size: 14px;
    z-index: 200; display: none; max-width: 320px; text-align: center;
    backdrop-filter: blur(10px);
  }
  #toast.show { display: block; }
</style>
</head>
<body>

<!-- ============ START SCREEN ============ -->
<div id="start">
  <div style="text-align:center">
    <h1>Glowfan</h1>
    <div class="subtitle">Slideshow Studio</div>
  </div>

  <div class="panel">
    <h2>이미지 선택</h2>
    <button class="btn full" id="pickBtn">갤러리에서 선택</button>
    <input type="file" id="fileInput" accept="image/*" multiple>
    <div id="fileCount" style="margin-top:12px; font-size:12px; opacity:0.6; font-family:ui-sans-serif; text-align:center;">선택된 이미지 없음</div>
  </div>

  <div id="thumbsBar"></div>

  <div class="panel">
    <h2>설정</h2>
    <div class="row">
      <label>슬라이드 시간</label>
      <div style="display:flex; align-items:center; gap:10px;">
        <input type="range" id="duration" min="1" max="15" value="4" step="0.5">
        <span id="durationVal" style="min-width:40px; text-align:right;">4.0s</span>
      </div>
    </div>
    <div class="row">
      <label>전환 효과</label>
      <select id="transition">
        <option value="fade">페이드</option>
        <option value="slide">슬라이드</option>
        <option value="cut">컷</option>
      </select>
    </div>
    <div class="row">
      <label>Ken Burns 효과</label>
      <div class="toggle on" id="kbToggle"></div>
    </div>
    <div class="row">
      <label>자동 재생</label>
      <div class="toggle on" id="autoToggle"></div>
    </div>
    <div class="row">
      <label>반복 재생</label>
      <div class="toggle on" id="loopToggle"></div>
    </div>
    <div class="row">
      <label>자동 전체화면</label>
      <div class="toggle on" id="fsToggle"></div>
    </div>
    <div class="row">
      <label>녹화 화질</label>
      <select id="quality">
        <option value="1080p">1080p (8Mbps)</option>
        <option value="720p">720p (5Mbps)</option>
        <option value="480p">480p (2Mbps)</option>
      </select>
    </div>
  </div>

  <div style="display:flex; gap:12px; width:100%; max-width:420px;">
    <button class="btn primary" id="startBtn" style="flex:1" disabled>재생</button>
    <button class="btn" id="recordBtn" style="flex:1" disabled>영상 저장</button>
  </div>
</div>

<!-- ============ PLAYER ============ -->
<div id="player">
  <div id="progress"><div id="progressFill"></div></div>
  <div id="topbar" class="auto-hide">
    <button class="icon-btn" id="closeBtn">✕</button>
    <div class="counter" id="counter">0 / 0</div>
    <button class="icon-btn" id="fsBtn">⛶</button>
  </div>
  <div id="recBadge">REC</div>
  <div id="stage"></div>
  <div id="bottombar" class="auto-hide">
    <button class="icon-btn" id="prevBtn">‹</button>
    <button class="icon-btn play" id="playBtn">▶</button>
    <button class="icon-btn" id="nextBtn">›</button>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ============ STATE ============
const state = {
  images: [],         // {url, name}
  index: 0,
  playing: false,
  duration: 4000,
  transition: 'fade',
  kenBurns: true,
  autoplay: true,
  loop: true,
  autoFullscreen: true,
  quality: '1080p',   // '1080p' | '720p' | '480p'
  timer: null,
  progressTimer: null,
  recording: false,
  mediaRecorder: null,
  recordChunks: [],
};

const QUALITY_PRESETS = {
  '1080p': { w: 1920, h: 1080, bitrate: 8_000_000 },
  '720p':  { w: 1280, h: 720,  bitrate: 5_000_000 },
  '480p':  { w: 854,  h: 480,  bitrate: 2_000_000 },
};

// ============ HELPERS ============
const $ = (id) => document.getElementById(id);
const toast = (msg, ms = 2000) => {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
};

// ============ FILE HANDLING ============
$('pickBtn').onclick = () => $('fileInput').click();

$('fileInput').onchange = (e) => {
  const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
  files.forEach(f => {
    const url = URL.createObjectURL(f);
    state.images.push({ url, name: f.name });
  });
  refreshThumbs();
  e.target.value = '';
};

function refreshThumbs() {
  const bar = $('thumbsBar');
  bar.innerHTML = '';
  state.images.forEach((img, i) => {
    const t = document.createElement('div');
    t.className = 'thumb';
    t.style.backgroundImage = `url(${img.url})`;
    const x = document.createElement('div');
    x.className = 'x'; x.textContent = '×';
    x.onclick = (e) => {
      e.stopPropagation();
      URL.revokeObjectURL(state.images[i].url);
      state.images.splice(i, 1);
      refreshThumbs();
    };
    t.appendChild(x);
    bar.appendChild(t);
  });
  $('fileCount').textContent = state.images.length
    ? `${state.images.length}장의 이미지 선택됨`
    : '선택된 이미지 없음';
  $('startBtn').disabled = state.images.length === 0;
  $('recordBtn').disabled = state.images.length === 0;
}

// ============ SETTINGS UI ============
$('duration').oninput = (e) => {
  state.duration = parseFloat(e.target.value) * 1000;
  $('durationVal').textContent = parseFloat(e.target.value).toFixed(1) + 's';
};
$('transition').onchange = (e) => state.transition = e.target.value;
$('quality').onchange = (e) => state.quality = e.target.value;

function bindToggle(id, key) {
  $(id).onclick = () => {
    state[key] = !state[key];
    $(id).classList.toggle('on', state[key]);
  };
}
bindToggle('kbToggle', 'kenBurns');
bindToggle('autoToggle', 'autoplay');
bindToggle('loopToggle', 'loop');
bindToggle('fsToggle', 'autoFullscreen');

// ============ PLAYER ============
$('startBtn').onclick = () => openPlayer(false);
$('recordBtn').onclick = () => openPlayer(true);
$('closeBtn').onclick = closePlayer;

async function openPlayer(record) {
  if (state.images.length === 0) return;
  $('start').style.display = 'none';
  $('player').classList.add('active');

  buildSlides();
  state.index = 0;
  showSlide(0, true);
  updateCounter();

  // 자동 전체화면 진입 (사용자 제스처 컨텍스트에서 호출되어야 함)
  if (state.autoFullscreen) {
    try {
      await document.documentElement.requestFullscreen({ navigationUI: 'hide' });
      // 화면 회전 잠금 (가로 우선, 실패해도 무시)
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {});
      }
    } catch (e) {
      // 일부 브라우저에서 실패 가능 — 무시하고 계속
      console.log('Fullscreen denied:', e.message);
    }
  }

  if (record) {
    await startRecording();
  }

  if (state.autoplay) play();
  resetIdleTimer();
}

function closePlayer() {
  pause();
  if (state.recording) stopRecording();
  $('player').classList.remove('active');
  $('start').style.display = 'flex';
  $('stage').innerHTML = '';
  if (document.fullscreenElement) document.exitFullscreen();
}

function buildSlides() {
  const stage = $('stage');
  stage.innerHTML = '';
  stage.className = `trans-${state.transition}` + (state.kenBurns ? ' kb' : '');
  state.images.forEach((img) => {
    const slide = document.createElement('div');
    slide.className = 'slide';
    const el = new Image();
    el.src = img.url;
    el.draggable = false;
    slide.appendChild(el);
    stage.appendChild(slide);
  });
  // Set Ken Burns duration to slide duration
  document.documentElement.style.setProperty('--kb-dur', (state.duration / 1000) + 's');
}

function showSlide(i, immediate = false) {
  const slides = document.querySelectorAll('.slide');
  if (slides.length === 0) return;
  i = ((i % slides.length) + slides.length) % slides.length;
  state.index = i;

  slides.forEach((s, idx) => {
    s.classList.remove('active', 'prev');
    const img = s.querySelector('img');
    img.classList.remove('active-kb');
    // Force reflow to restart animation
    void img.offsetWidth;
    if (idx === i) {
      s.classList.add('active');
      if (state.kenBurns) img.classList.add('active-kb');
    } else if (idx === (i - 1 + slides.length) % slides.length) {
      s.classList.add('prev');
    }
  });
  updateCounter();
  resetProgress();
}

function updateCounter() {
  $('counter').textContent = `${state.index + 1} / ${state.images.length}`;
}

function next() {
  const last = state.index >= state.images.length - 1;
  if (last && !state.loop) {
    pause();
    if (state.recording) stopRecording();
    return;
  }
  showSlide(state.index + 1);
}

function prev() { showSlide(state.index - 1); }

function play() {
  state.playing = true;
  $('playBtn').textContent = '❚❚';
  scheduleNext();
}

function pause() {
  state.playing = false;
  $('playBtn').textContent = '▶';
  clearTimeout(state.timer);
  clearInterval(state.progressTimer);
  $('progressFill').style.width = '0%';
}

function scheduleNext() {
  clearTimeout(state.timer);
  state.timer = setTimeout(() => {
    if (!state.playing) return;
    next();
    if (state.playing) scheduleNext();
  }, state.duration);
}

function resetProgress() {
  clearInterval(state.progressTimer);
  const fill = $('progressFill');
  fill.style.width = '0%';
  if (!state.playing) return;
  const start = Date.now();
  state.progressTimer = setInterval(() => {
    const pct = Math.min(100, (Date.now() - start) / state.duration * 100);
    fill.style.width = pct + '%';
    if (pct >= 100) clearInterval(state.progressTimer);
  }, 50);
}

$('playBtn').onclick = () => state.playing ? pause() : play();
$('nextBtn').onclick = () => { pause(); next(); };
$('prevBtn').onclick = () => { pause(); prev(); };

// ============ TOUCH GESTURES ============
let touchStart = null;
$('stage').addEventListener('touchstart', (e) => {
  if (e.touches.length !== 1) return;
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now() };
});
$('stage').addEventListener('touchend', (e) => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  const dt = Date.now() - touchStart.t;
  if (dt < 300 && Math.abs(dx) < 10 && Math.abs(dy) < 10) {
    // tap
    toggleControls();
  } else if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
    pause();
    if (dx < 0) next(); else prev();
  }
  touchStart = null;
  resetIdleTimer();
});

// Click for desktop
$('stage').addEventListener('click', (e) => {
  if (e.target.closest('button')) return;
  // touch already handled by touchend; ignore if it was a touch
  if ('ontouchstart' in window) return;
  toggleControls();
});

function toggleControls() {
  document.querySelectorAll('.auto-hide').forEach(el => el.classList.toggle('hidden'));
}

let idleTimer = null;
function resetIdleTimer() {
  document.querySelectorAll('.auto-hide').forEach(el => el.classList.remove('hidden'));
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    if (state.playing) {
      document.querySelectorAll('.auto-hide').forEach(el => el.classList.add('hidden'));
    }
  }, 3000);
}

// ============ FULLSCREEN ============
$('fsBtn').onclick = async () => {
  if (!document.fullscreenElement) {
    try {
      await document.documentElement.requestFullscreen({ navigationUI: 'hide' });
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {});
      }
    } catch (e) { toast('전체화면 지원 안됨'); }
  } else {
    if (screen.orientation && screen.orientation.unlock) {
      try { screen.orientation.unlock(); } catch (e) {}
    }
    document.exitFullscreen();
  }
};

// ============ RECORDING (MediaRecorder + canvas capture) ============
async function startRecording() {
  if (!('MediaRecorder' in window)) {
    toast('이 브라우저는 영상 녹화를 지원하지 않습니다');
    return;
  }
  try {
    // Render slides to a canvas for capture
    const canvas = document.createElement('canvas');
    const preset = QUALITY_PRESETS[state.quality] || QUALITY_PRESETS['1080p'];
    const W = preset.w, H = preset.h;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    // Hidden offscreen canvas drawing loop
    let rafId;
    const drawLoop = () => {
      const activeSlide = document.querySelector('.slide.active');
      if (activeSlide) {
        const img = activeSlide.querySelector('img');
        if (img && img.complete && img.naturalWidth) {
          ctx.fillStyle = '#000';
          ctx.fillRect(0, 0, W, H);

          // Compute current transform from CSS animation if Ken Burns is on
          const cs = window.getComputedStyle(img);
          const matrix = new DOMMatrixReadOnly(cs.transform === 'none' ? 'matrix(1,0,0,1,0,0)' : cs.transform);

          // Fit image into canvas (contain)
          const iw = img.naturalWidth, ih = img.naturalHeight;
          const scale = Math.min(W / iw, H / ih);
          const dw = iw * scale, dh = ih * scale;
          const dx = (W - dw) / 2, dy = (H - dh) / 2;

          ctx.save();
          ctx.translate(W / 2, H / 2);
          ctx.transform(matrix.a, matrix.b, matrix.c, matrix.d, matrix.e, matrix.f);
          ctx.translate(-W / 2, -H / 2);
          ctx.drawImage(img, dx, dy, dw, dh);
          ctx.restore();

          // Apply opacity for fade transition
          const opacity = parseFloat(cs.opacity || 1);
          if (opacity < 1) {
            ctx.fillStyle = `rgba(0,0,0,${1 - opacity})`;
            ctx.fillRect(0, 0, W, H);
          }
        }
      }
      rafId = requestAnimationFrame(drawLoop);
    };
    drawLoop();

    const stream = canvas.captureStream(30);
    const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
      ? 'video/webm;codecs=vp9'
      : 'video/webm';
    state.mediaRecorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: preset.bitrate });
    state.recordChunks = [];
    state.mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) state.recordChunks.push(e.data); };
    state.mediaRecorder.onstop = () => {
      cancelAnimationFrame(rafId);
      const blob = new Blob(state.recordChunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `slideshow_${state.quality}_${Date.now()}.webm`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      toast('영상 다운로드 완료');
    };
    state.mediaRecorder._rafId = rafId;
    state.mediaRecorder.start();
    state.recording = true;
    $('recBadge').classList.add('on');
    // Force loop off for recording (one pass only)
    state._origLoop = state.loop;
    state.loop = false;
    toast(`녹화 시작 (${state.quality}) — 끝까지 재생됩니다`, 1500);
  } catch (err) {
    toast('녹화 시작 실패: ' + err.message);
    console.error(err);
  }
}

function stopRecording() {
  if (!state.recording) return;
  state.recording = false;
  $('recBadge').classList.remove('on');
  if (state.mediaRecorder && state.mediaRecorder.state !== 'inactive') {
    state.mediaRecorder.stop();
  }
  if (state._origLoop !== undefined) {
    state.loop = state._origLoop;
    delete state._origLoop;
  }
}

// ============ KEYBOARD ============
document.addEventListener('keydown', (e) => {
  if (!$('player').classList.contains('active')) return;
  if (e.key === 'ArrowRight') { pause(); next(); }
  else if (e.key === 'ArrowLeft') { pause(); prev(); }
  else if (e.key === ' ') { e.preventDefault(); state.playing ? pause() : play(); }
  else if (e.key === 'Escape') closePlayer();
});

// ============ Service Worker (offline cache) ============
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'glowfan-slideshow-v1';
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => self.clients.claim());
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.open(CACHE).then(cache =>
          cache.match(e.request).then(cached =>
            cached || fetch(e.request).then(resp => {
              if (e.request.method === 'GET' && resp.ok && e.request.url.startsWith(self.location.origin)) {
                cache.put(e.request, resp.clone());
              }
              return resp;
            }).catch(() => cached)
          )
        )
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}

// Prevent pull-to-refresh
document.addEventListener('touchmove', (e) => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

</script>
</body>
</html>
