<!DOCTYPE html>
<html lang="ko">
<head>

<style>
  :root {
    --bg: #0a0a0a;
    --fg: #f4f1ea;
    --accent: #e8c468;
    --panel: rgba(15, 15, 15, 0.85);
    --border: rgba(232, 196, 104, 0.25);
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; width: 100%; overflow: hidden;
    background: var(--bg); color: var(--fg);
    font-family: 'Cormorant Garamond', 'Noto Serif KR', Georgia, serif;
    user-select: none; -webkit-user-select: none;
    overscroll-behavior: none;
  }
  body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

  /* ===== Start Screen ===== */
  #start {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; gap: 28px;
    background: radial-gradient(ellipse at top, #1a1410 0%, #0a0a0a 70%);
  }
  #start h1 {
    font-size: clamp(36px, 9vw, 56px);
    font-weight: 300; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(232, 196, 104, 0.3);
  }
  #start .subtitle {
    font-size: 13px; letter-spacing: 0.4em; text-transform: uppercase;
    opacity: 0.5; font-family: ui-sans-serif, system-ui;
    margin-top: -20px;
  }
  .panel {
    width: 100%; max-width: 420px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 4px; padding: 20px;
    backdrop-filter: blur(10px);
  }
  .panel h2 {
    font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
    opacity: 0.6; margin-bottom: 14px; font-family: ui-sans-serif, system-ui; font-weight: 500;
  }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 0; font-size: 14px; font-family: ui-sans-serif, system-ui; }
  .row + .row { border-top: 1px solid rgba(255,255,255,0.05); }
  .row label { opacity: 0.85; }
  input[type="range"] { flex: 1; max-width: 160px; accent-color: var(--accent); }
  select, input[type="number"] {
    background: rgba(0,0,0,0.4); color: var(--fg);
    border: 1px solid var(--border); border-radius: 3px;
    padding: 6px 10px; font-family: inherit; font-size: 13px;
    min-width: 100px;
  }
  input[type="number"] { width: 70px; min-width: auto; }

  .toggle { position: relative; width: 44px; height: 24px; background: #2a2a2a; border-radius: 12px; cursor: pointer; transition: background 0.2s; }
  .toggle.on { background: var(--accent); }
  .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
  .toggle.on::after { transform: translateX(20px); }

  .btn {
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent); border-radius: 2px;
    padding: 14px 28px; font-size: 13px; letter-spacing: 0.2em;
    text-transform: uppercase; cursor: pointer;
    font-family: ui-sans-serif, system-ui; font-weight: 500;
    transition: all 0.2s;
  }
  .btn:active { background: var(--accent); color: var(--bg); }
  .btn.primary { background: var(--accent); color: var(--bg); }
  .btn.full { width: 100%; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  #fileInput { display: none; }
  #thumbsBar {
    width: 100%; max-width: 420px;
    display: flex; gap: 6px; overflow-x: auto;
    padding: 4px 2px; scrollbar-width: none;
  }
  #thumbsBar::-webkit-scrollbar { display: none; }
  .thumb {
    flex: 0 0 60px; height: 60px; border-radius: 3px;
    background-size: cover; background-position: center;
    border: 1px solid var(--border); position: relative;
  }
  .thumb .x {
    position: absolute; top: -6px; right: -6px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--danger); color: white; font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-family: ui-sans-serif;
  }

  /* ===== Player ===== */
  #player { position: fixed; inset: 0; display: none; background: #000; }
  #player.active { display: block; }
  #stage { position: absolute; inset: 0; overflow: hidden; }
  .slide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    will-change: transform, opacity;
  }
  .slide.active { opacity: 1; pointer-events: auto; }
  .slide img {
    max-width: 100%; max-height: 100%;
    object-fit: contain; will-change: transform;
  }
  .slide video {
    max-width: 100%; max-height: 100%;
    object-fit: contain; will-change: transform;
    background: #000;
  }

  /* Transitions */
  .trans-fade .slide { transition: opacity 0.8s ease-in-out; }
  .trans-slide .slide { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s; transform: translateX(100%); }
  .trans-slide .slide.active { transform: translateX(0); }
  .trans-slide .slide.prev { transform: translateX(-100%); }
  /* 동영상 슬라이드 진입 시 즉시 컷 (transition 무시) */
  #stage.video-cut .slide { transition: none !important; transform: none !important; }

  /* Ken Burns */
  @keyframes kb1 { from { transform: scale(1) translate(0,0); } to { transform: scale(1.15) translate(-3%, -2%); } }
  @keyframes kb2 { from { transform: scale(1.15) translate(2%, 1%); } to { transform: scale(1) translate(0, 0); } }
  @keyframes kb3 { from { transform: scale(1) translate(-2%, 2%); } to { transform: scale(1.18) translate(3%, -3%); } }
  @keyframes kb4 { from { transform: scale(1.1) translate(0, -2%); } to { transform: scale(1) translate(-2%, 2%); } }
  .kb img.active-kb { animation-duration: var(--kb-dur, 5s); animation-timing-function: ease-in-out; animation-fill-mode: both; }
  .kb .slide:nth-child(4n+1) img.active-kb { animation-name: kb1; }
  .kb .slide:nth-child(4n+2) img.active-kb { animation-name: kb2; }
  .kb .slide:nth-child(4n+3) img.active-kb { animation-name: kb3; }
  .kb .slide:nth-child(4n) img.active-kb { animation-name: kb4; }

  /* Top bar */
  #topbar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: max(12px, env(safe-area-inset-top)) 16px 12px;
    display: flex; justify-content: space-between; align-items: center;
    background: linear-gradient(180deg, rgba(0,0,0,0.6), transparent);
    z-index: 10; transition: opacity 0.3s;
    font-family: ui-sans-serif, system-ui; font-size: 12px;
  }
  #topbar .counter { color: var(--accent); letter-spacing: 0.1em; }
  #topbar .icon-btn {
    background: transparent; border: none; color: var(--fg);
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 20px;
  }
  #topbar .icon-btn:active { background: rgba(255,255,255,0.1); }
  .auto-hide.hidden { opacity: 0; pointer-events: none; }

  /* Bottom bar */
  #bottombar {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 12px 16px max(12px, env(safe-area-inset-bottom));
    display: flex; justify-content: center; gap: 24px;
    background: linear-gradient(0deg, rgba(0,0,0,0.6), transparent);
    z-index: 10; transition: opacity 0.3s;
  }
  #bottombar .icon-btn {
    background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15);
    color: var(--fg); width: 52px; height: 52px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 22px; backdrop-filter: blur(10px);
  }
  #bottombar .icon-btn.play { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  /* Progress */
  #progress {
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px; background: rgba(255,255,255,0.1); z-index: 11;
  }
  #progressFill {
    height: 100%; background: var(--accent);
    width: 0%; transition: width 0.1s linear;
  }

  /* Recording indicator */
  #recBadge {
    position: absolute; top: 60px; right: 16px;
    background: rgba(255, 50, 50, 0.9); color: white;
    padding: 6px 12px; border-radius: 20px;
    font-size: 11px; letter-spacing: 0.15em; font-family: ui-sans-serif;
    display: none; align-items: center; gap: 6px; z-index: 12;
  }
  #recBadge.on { display: flex; }
  #recBadge::before {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
    background: white; animation: blink 1s infinite;
  }
  @keyframes blink { 50% { opacity: 0.2; } }

  /* Delete button armed state (첫 탭 후 빨간 펄스) */
  #deleteBtn.armed {
    background: var(--danger);
    color: white;
    animation: pulse-armed 0.6s ease-in-out infinite alternate;
  }
  @keyframes pulse-armed {
    from { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.6); }
    to   { box-shadow: 0 0 0 8px rgba(255, 107, 107, 0); }
  }

  /* Toast */
  #toast {
    position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%);
    background: var(--panel); border: 1px solid var(--border);
    color: var(--fg); padding: 16px 24px; border-radius: 4px;
    font-family: ui-sans-serif, system-ui; font-size: 14px;
    z-index: 200; display: none; max-width: 320px; text-align: center;
    backdrop-filter: blur(10px);
  }
  #toast.show { display: block; }
</style>
</head>
<body>

<!-- ============ START SCREEN ============ -->
<div id="start">
  <div style="text-align:center">
    <h1>Glowfan</h1>
    <div class="subtitle">Slideshow Studio</div>
  </div>

  <div class="panel">
    <h2>이미지 선택</h2>
    <button class="btn full" id="pickBtn">갤러리에서 선택</button>
    <input type="file" id="fileInput" accept="image/*,video/*" multiple>
    <div id="fileCount" style="margin-top:12px; font-size:12px; opacity:0.6; font-family:ui-sans-serif; text-align:center;">선택된 파일 없음</div>
  </div>

  <div id="thumbsBar"></div>

  <div class="panel">
    <h2>재생</h2>
    <div class="row">
      <label>재생 모드</label>
      <select id="playMode">
        <option value="mixed">혼합 (순서대로)</option>
        <option value="images">이미지만</option>
        <option value="videos">동영상만</option>
      </select>
    </div>
    <div class="row">
      <label>자동 재생</label>
      <div class="toggle on" id="autoToggle"></div>
    </div>
    <div class="row">
      <label>반복 재생</label>
      <div class="toggle on" id="loopToggle"></div>
    </div>
    <div class="row">
      <label>자동 전체화면</label>
      <div class="toggle on" id="fsToggle"></div>
    </div>
    <div class="row">
      <label>화면 방향</label>
      <select id="orientation">
        <option value="landscape">가로 (Landscape)</option>
        <option value="portrait">세로 (Portrait)</option>
        <option value="any">자유 회전</option>
      </select>
    </div>
    <div class="row">
      <label>녹화 화질</label>
      <select id="quality">
        <option value="1080p">1080p (8Mbps)</option>
        <option value="720p">720p (5Mbps)</option>
        <option value="480p">480p (2Mbps)</option>
      </select>
    </div>
  </div>

  <div class="panel">
    <h2>이미지 설정</h2>
    <div class="row">
      <label>슬라이드 시간</label>
      <div style="display:flex; align-items:center; gap:10px;">
        <input type="range" id="duration" min="1" max="15" value="4" step="0.5">
        <span id="durationVal" style="min-width:40px; text-align:right;">4.0s</span>
      </div>
    </div>
    <div class="row">
      <label>전환 효과</label>
      <select id="transition">
        <option value="fade">페이드</option>
        <option value="slide">슬라이드</option>
        <option value="cut">컷</option>
      </select>
    </div>
    <div class="row">
      <label>Ken Burns 효과</label>
      <div class="toggle on" id="kbToggle"></div>
    </div>
  </div>

  <div class="panel">
    <h2>동영상 설정</h2>
    <div class="row">
      <label>음소거</label>
      <div class="toggle on" id="muteToggle"></div>
    </div>
    <div class="row">
      <label>재생 속도</label>
      <div style="display:flex; align-items:center; gap:10px;">
        <input type="range" id="playbackRate" min="0.5" max="2" value="1" step="0.1">
        <span id="playbackRateVal" style="min-width:40px; text-align:right;">1.0x</span>
      </div>
    </div>
  </div>

  <div style="display:flex; gap:12px; width:100%; max-width:420px;">
    <button class="btn primary" id="startBtn" style="flex:1" disabled>재생</button>
    <button class="btn" id="recordBtn" style="flex:1" disabled>영상 저장</button>
  </div>
</div>

<!-- ============ PLAYER ============ -->
<div id="player">
  <div id="progress"><div id="progressFill"></div></div>
  <div id="topbar" class="auto-hide">
    <button class="icon-btn" id="closeBtn">✕</button>
    <div class="counter" id="counter">0 / 0</div>
    <div style="display:flex; gap:4px;">
      <button class="icon-btn" id="deleteBtn" title="현재 슬라이드 삭제">🗑</button>
      <button class="icon-btn" id="fsBtn">⛶</button>
    </div>
  </div>
  <div id="recBadge">REC</div>
  <div id="stage"></div>
  <div id="bottombar" class="auto-hide">
    <button class="icon-btn" id="prevBtn">‹</button>
    <button class="icon-btn play" id="playBtn">▶</button>
    <button class="icon-btn" id="nextBtn">›</button>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ============ STATE ============
const state = {
  images: [],         // {url, name, type, thumb?, duration?}
  index: 0,
  playing: false,
  duration: 4000,
  transition: 'fade',
  kenBurns: true,
  autoplay: true,
  loop: true,
  autoFullscreen: true,
  orientation: 'landscape',
  quality: '1080p',
  playMode: 'mixed',  // 'mixed' | 'images' | 'videos'
  muted: true,
  playbackRate: 1.0,
  filteredIndices: [], // playMode 따라 필터된 원본 인덱스 배열
  timer: null,
  progressTimer: null,
  recording: false,
  mediaRecorder: null,
  recordChunks: [],
};

const QUALITY_PRESETS = {
  '1080p': { w: 1920, h: 1080, bitrate: 8_000_000 },
  '720p':  { w: 1280, h: 720,  bitrate: 5_000_000 },
  '480p':  { w: 854,  h: 480,  bitrate: 2_000_000 },
};

// 두 번 탭 삭제 메커니즘용 타이머
let deleteArmedTimer = null;

// ============ HELPERS ============
const $ = (id) => document.getElementById(id);
const toast = (msg, ms = 2000) => {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
};

// ============ FILE HANDLING ============
$('pickBtn').onclick = () => $('fileInput').click();

$('fileInput').onchange = async (e) => {
  const files = Array.from(e.target.files).filter(f =>
    f.type.startsWith('image/') || f.type.startsWith('video/')
  );
  if (files.length === 0) return;

  const startBtn = $('startBtn'), recordBtn = $('recordBtn');
  startBtn.disabled = recordBtn.disabled = true;
  $('fileCount').textContent = `파일 처리 중... 0 / ${files.length}`;

  let done = 0;
  for (const f of files) {
    try {
      if (f.type.startsWith('video/')) {
        // 동영상: 원본 URL + 첫 프레임 썸네일
        const url = URL.createObjectURL(f);
        const thumb = await videoThumbnail(url).catch(() => null);
        const duration = await videoDuration(url).catch(() => 0);
        state.images.push({ url, name: f.name, type: 'video', thumb, duration });
      } else {
        // 이미지: 리사이즈 후 저장
        const url = await resizeImage(f, 1920, 0.85);
        state.images.push({ url, name: f.name, type: 'image' });
      }
    } catch (err) {
      console.error('파일 처리 실패:', f.name, err);
    }
    done++;
    $('fileCount').textContent = `파일 처리 중... ${done} / ${files.length}`;
    refreshThumbs();
  }

  e.target.value = '';
};

// 동영상에서 첫 프레임을 썸네일로 추출 (data URL 반환)
function videoThumbnail(videoUrl) {
  return new Promise((resolve, reject) => {
    const v = document.createElement('video');
    v.muted = true; v.playsInline = true; v.preload = 'metadata';
    v.crossOrigin = 'anonymous';
    v.onloadeddata = () => {
      try {
        v.currentTime = Math.min(0.1, (v.duration || 1) / 2);
      } catch (e) { reject(e); }
    };
    v.onseeked = () => {
      const canvas = document.createElement('canvas');
      const scale = Math.min(1, 320 / Math.max(v.videoWidth, v.videoHeight));
      canvas.width = Math.max(1, Math.round(v.videoWidth * scale));
      canvas.height = Math.max(1, Math.round(v.videoHeight * scale));
      canvas.getContext('2d').drawImage(v, 0, 0, canvas.width, canvas.height);
      v.remove();
      resolve(canvas.toDataURL('image/jpeg', 0.7));
    };
    v.onerror = () => reject(new Error('video thumbnail load failed'));
    v.src = videoUrl;
  });
}

// 동영상 길이 (초)
function videoDuration(videoUrl) {
  return new Promise((resolve, reject) => {
    const v = document.createElement('video');
    v.preload = 'metadata';
    v.onloadedmetadata = () => { const d = v.duration; v.remove(); resolve(d); };
    v.onerror = () => reject(new Error('video metadata load failed'));
    v.src = videoUrl;
  });
}

// 이미지를 최대 maxDim 픽셀로 리사이즈해서 blob URL 반환
function resizeImage(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      // 이미 작으면 그대로 사용 (오리엔테이션은 그대로 두면 EXIF 회전 문제 발생 가능)
      const scale = Math.min(1, maxDim / Math.max(width, height));
      const w = Math.round(width * scale);
      const h = Math.round(height * scale);

      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      canvas.toBlob((blob) => {
        URL.revokeObjectURL(img.src);  // 원본 blob URL 즉시 해제
        if (!blob) { reject(new Error('blob 생성 실패')); return; }
        resolve(URL.createObjectURL(blob));
      }, 'image/jpeg', quality);
    };
    img.onerror = () => reject(new Error('이미지 로드 실패'));
    img.src = URL.createObjectURL(file);
  });
};

function refreshThumbs() {
  const bar = $('thumbsBar');
  bar.innerHTML = '';
  state.images.forEach((img, i) => {
    const t = document.createElement('div');
    t.className = 'thumb';
    // 동영상은 추출된 썸네일 사용 (blob URL은 background-image로 안 보임)
    const thumbSrc = img.type === 'video' ? (img.thumb || '') : img.url;
    if (thumbSrc) t.style.backgroundImage = `url(${thumbSrc})`;
    if (img.type === 'video') {
      const playIcon = document.createElement('div');
      playIcon.textContent = '▶';
      playIcon.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;text-shadow:0 0 4px rgba(0,0,0,0.8);pointer-events:none;';
      t.appendChild(playIcon);
    }
    const x = document.createElement('div');
    x.className = 'x'; x.textContent = '×';
    x.onclick = (e) => {
      e.stopPropagation();
      URL.revokeObjectURL(state.images[i].url);
      state.images.splice(i, 1);
      refreshThumbs();
    };
    t.appendChild(x);
    bar.appendChild(t);
  });
  const total = state.images.length;
  if (total) {
    const vids = state.images.filter(x => x.type === 'video').length;
    const imgs = total - vids;
    $('fileCount').textContent = vids
      ? `이미지 ${imgs}개, 동영상 ${vids}개 선택됨`
      : `${imgs}장의 이미지 선택됨`;
  } else {
    $('fileCount').textContent = '선택된 파일 없음';
  }
  $('startBtn').disabled = state.images.length === 0;
  $('recordBtn').disabled = state.images.length === 0;
}

// ============ SETTINGS UI ============
$('duration').oninput = (e) => {
  state.duration = parseFloat(e.target.value) * 1000;
  $('durationVal').textContent = parseFloat(e.target.value).toFixed(1) + 's';
};
$('transition').onchange = (e) => state.transition = e.target.value;
$('quality').onchange = (e) => state.quality = e.target.value;
$('orientation').onchange = (e) => state.orientation = e.target.value;
$('playMode').onchange = (e) => state.playMode = e.target.value;
$('playbackRate').oninput = (e) => {
  state.playbackRate = parseFloat(e.target.value);
  $('playbackRateVal').textContent = state.playbackRate.toFixed(1) + 'x';
  // 현재 재생 중인 동영상에도 즉시 적용
  document.querySelectorAll('#stage video').forEach(v => {
    try { v.playbackRate = state.playbackRate; } catch (e) {}
  });
};

function bindToggle(id, key) {
  $(id).onclick = () => {
    state[key] = !state[key];
    $(id).classList.toggle('on', state[key]);
  };
}
bindToggle('kbToggle', 'kenBurns');
bindToggle('autoToggle', 'autoplay');
bindToggle('loopToggle', 'loop');
bindToggle('fsToggle', 'autoFullscreen');
// 음소거 토글 - 현재 재생 중인 동영상에도 즉시 적용
$('muteToggle').onclick = () => {
  state.muted = !state.muted;
  $('muteToggle').classList.toggle('on', state.muted);
  document.querySelectorAll('#stage video').forEach(v => { v.muted = state.muted; });
};

// ============ PLAYER ============
$('startBtn').onclick = () => openPlayer(false);
$('recordBtn').onclick = () => openPlayer(true);
$('closeBtn').onclick = closePlayer;

async function openPlayer(record) {
  if (state.images.length === 0) return;

  // 재생 모드에 따라 필터된 인덱스 배열 생성
  state.filteredIndices = state.images
    .map((item, idx) => ({ item, idx }))
    .filter(({ item }) => {
      if (state.playMode === 'images') return item.type === 'image';
      if (state.playMode === 'videos') return item.type === 'video';
      return true; // mixed
    })
    .map(({ idx }) => idx);

  if (state.filteredIndices.length === 0) {
    const msg = state.playMode === 'images' ? '이미지가 없습니다' :
                state.playMode === 'videos' ? '동영상이 없습니다' : '재생할 파일이 없습니다';
    toast(msg);
    return;
  }

  $('start').style.display = 'none';
  $('player').classList.add('active');

  buildSlides();
  state.index = 0;
  showSlide(0, true);
  updateCounter();

  // 자동 전체화면 진입 (사용자 제스처 컨텍스트에서 호출되어야 함)
  if (state.autoFullscreen) {
    try {
      await document.documentElement.requestFullscreen({ navigationUI: 'hide' });
      // 화면 회전 잠금 (사용자 선택 방향, 'any'면 잠금 해제)
      if (screen.orientation && screen.orientation.lock) {
        if (state.orientation === 'any') {
          if (screen.orientation.unlock) {
            try { screen.orientation.unlock(); } catch (e) {}
          }
        } else {
          screen.orientation.lock(state.orientation).catch(() => {});
        }
      }
    } catch (e) {
      // 일부 브라우저에서 실패 가능 — 무시하고 계속
      console.log('Fullscreen denied:', e.message);
    }
  }

  if (record) {
    await startRecording();
  }

  if (state.autoplay) play();
  resetIdleTimer();
}

function closePlayer() {
  pause();
  if (state.recording) stopRecording();
  // armed 삭제 상태 해제
  const delBtn = $('deleteBtn');
  if (delBtn) delBtn.classList.remove('armed');
  clearTimeout(deleteArmedTimer);
  // 모든 슬라이드 미디어 정리 (메모리 해제)
  document.querySelectorAll('#stage img').forEach(img => {
    img.removeAttribute('src');
    img.src = '';
  });
  document.querySelectorAll('#stage video').forEach(v => {
    try { v.pause(); } catch (e) {}
    v.removeAttribute('src');
    v.load();
  });
  $('player').classList.remove('active');
  $('start').style.display = 'flex';
  $('stage').innerHTML = '';
  if (document.fullscreenElement) document.exitFullscreen();
}

function buildSlides() {
  const stage = $('stage');
  stage.innerHTML = '';
  // 동영상은 transition class 적용 안 됨 (컷만), 이미지만 transition 적용
  stage.className = `trans-${state.transition}` + (state.kenBurns ? ' kb' : '');
  // filteredIndices에 해당하는 슬라이드만 생성
  state.filteredIndices.forEach((srcIdx) => {
    const item = state.images[srcIdx];
    const slide = document.createElement('div');
    slide.className = 'slide';
    let el;
    if (item.type === 'video') {
      el = document.createElement('video');
      el.muted = state.muted;
      el.playsInline = true;
      el.preload = 'none';
      el.controls = false;
      slide.classList.add('is-video');
    } else {
      el = new Image();
    }
    el.draggable = false;
    slide.appendChild(el);
    stage.appendChild(slide);
  });
  document.documentElement.style.setProperty('--kb-dur', (state.duration / 1000) + 's');
}

function showSlide(i, immediate = false) {
  const slides = document.querySelectorAll('.slide');
  if (slides.length === 0) return;
  i = ((i % slides.length) + slides.length) % slides.length;
  state.index = i;

  // 슬라이드 이동 시 삭제 armed 상태 자동 해제
  const delBtn = $('deleteBtn');
  if (delBtn && delBtn.classList.contains('armed')) {
    delBtn.classList.remove('armed');
    clearTimeout(deleteArmedTimer);
  }

  // 현재/이전/다음 슬라이드만 메모리에 유지 (녹화 중엔 전체 유지)
  const keep = new Set();
  if (state.recording) {
    for (let k = 0; k < slides.length; k++) keep.add(k);
  } else {
    keep.add(i);
    keep.add((i - 1 + slides.length) % slides.length);
    keep.add((i + 1) % slides.length);
  }

  // 동영상이면 stage에서 transition 비활성 (컷만 적용)
  const currentItem = state.images[state.filteredIndices[i]];
  const stage = $('stage');
  if (currentItem && currentItem.type === 'video') {
    // 동영상 슬라이드 진입 시 페이드/슬라이드 효과 제거 (컷)
    stage.classList.add('video-cut');
  } else {
    stage.classList.remove('video-cut');
  }

  slides.forEach((s, idx) => {
    s.classList.remove('active', 'prev');
    // filteredIndices를 통해 원본 데이터 접근
    const srcIdx = state.filteredIndices[idx];
    const item = state.images[srcIdx];
    const isVideo = item.type === 'video';
    const media = s.querySelector(isVideo ? 'video' : 'img');
    if (!isVideo) media.classList.remove('active-kb');

    if (keep.has(idx)) {
      // 필요한 슬라이드만 src 할당 (이미 있으면 스킵)
      if (isVideo) {
        if (!media.src) {
          media.src = item.url;
          media.load();
        }
      } else {
        if (media.src !== item.url) media.src = item.url;
      }
    } else {
      // 사용 안 하는 슬라이드는 메모리 해제
      if (isVideo) {
        try { media.pause(); } catch (e) {}
        if (media.src) { media.removeAttribute('src'); media.load(); }
      } else if (media.src) {
        media.removeAttribute('src');
        media.src = '';
      }
    }

    void media.offsetWidth;  // reflow for animation restart
    if (idx === i) {
      s.classList.add('active');
      if (isVideo) {
        // 동영상 활성화 — 처음부터 재생, 음소거/속도 설정 적용
        try { media.currentTime = 0; } catch (e) {}
        media.muted = state.muted;
        media.playbackRate = state.playbackRate;
        media.onended = null;
        media.onended = () => {
          if (state.playing) next();
        };
        const playPromise = media.play();
        if (playPromise && playPromise.catch) {
          playPromise.catch(err => {
            console.log('video autoplay blocked:', err.message);
          });
        }
      } else if (state.kenBurns) {
        media.classList.add('active-kb');
      }
    } else if (idx === (i - 1 + slides.length) % slides.length) {
      s.classList.add('prev');
      if (isVideo) { try { media.pause(); } catch (e) {} }
    } else if (isVideo) {
      try { media.pause(); } catch (e) {}
    }
  });
  updateCounter();
  resetProgress();
}

function updateCounter() {
  $('counter').textContent = `${state.index + 1} / ${state.filteredIndices.length}`;
}

function next() {
  const last = state.index >= state.filteredIndices.length - 1;
  if (last && !state.loop) {
    pause();
    if (state.recording) stopRecording();
    return;
  }
  showSlide(state.index + 1);
}

function prev() { showSlide(state.index - 1); }

function currentItem() {
  return state.images[state.filteredIndices[state.index]];
}

function play() {
  state.playing = true;
  $('playBtn').textContent = '❚❚';
  const cur = currentItem();
  if (cur && cur.type === 'video') {
    const slide = document.querySelectorAll('.slide')[state.index];
    const v = slide && slide.querySelector('video');
    if (v) { v.play().catch(() => {}); }
  }
  scheduleNext();
  resetProgress();
}

function pause() {
  state.playing = false;
  $('playBtn').textContent = '▶';
  clearTimeout(state.timer);
  clearInterval(state.progressTimer);
  const cur = currentItem();
  if (cur && cur.type === 'video') {
    const slide = document.querySelectorAll('.slide')[state.index];
    const v = slide && slide.querySelector('video');
    if (v) { try { v.pause(); } catch (e) {} }
  }
  $('progressFill').style.width = '0%';
}

function scheduleNext() {
  clearTimeout(state.timer);
  const cur = currentItem();
  if (cur && cur.type === 'video') return;  // 동영상은 onended로 진행

  state.timer = setTimeout(() => {
    if (!state.playing) return;
    next();
    if (state.playing) scheduleNext();
  }, state.duration);
}

function resetProgress() {
  clearInterval(state.progressTimer);
  const fill = $('progressFill');
  fill.style.width = '0%';
  if (!state.playing) return;

  const cur = currentItem();
  if (cur && cur.type === 'video') {
    const slide = document.querySelectorAll('.slide')[state.index];
    const v = slide && slide.querySelector('video');
    if (!v) return;
    state.progressTimer = setInterval(() => {
      if (!v.duration || isNaN(v.duration)) return;
      const pct = Math.min(100, (v.currentTime / v.duration) * 100);
      fill.style.width = pct + '%';
    }, 100);
    return;
  }

  const start = Date.now();
  state.progressTimer = setInterval(() => {
    const pct = Math.min(100, (Date.now() - start) / state.duration * 100);
    fill.style.width = pct + '%';
    if (pct >= 100) clearInterval(state.progressTimer);
  }, 50);
}

$('playBtn').onclick = () => state.playing ? pause() : play();
$('nextBtn').onclick = () => { pause(); next(); };
$('prevBtn').onclick = () => { pause(); prev(); };

// ============ TOUCH GESTURES ============
let touchStart = null;
$('stage').addEventListener('touchstart', (e) => {
  if (e.touches.length !== 1) return;
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now() };
});
$('stage').addEventListener('touchend', (e) => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  const dt = Date.now() - touchStart.t;
  if (dt < 300 && Math.abs(dx) < 10 && Math.abs(dy) < 10) {
    // tap
    toggleControls();
  } else if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
    pause();
    if (dx < 0) next(); else prev();
  }
  touchStart = null;
  resetIdleTimer();
});

// Click for desktop
$('stage').addEventListener('click', (e) => {
  if (e.target.closest('button')) return;
  // touch already handled by touchend; ignore if it was a touch
  if ('ontouchstart' in window) return;
  toggleControls();
});

function toggleControls() {
  document.querySelectorAll('.auto-hide').forEach(el => el.classList.toggle('hidden'));
}

let idleTimer = null;
function resetIdleTimer() {
  document.querySelectorAll('.auto-hide').forEach(el => el.classList.remove('hidden'));
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    if (state.playing) {
      document.querySelectorAll('.auto-hide').forEach(el => el.classList.add('hidden'));
    }
  }, 3000);
}

// ============ FULLSCREEN ============
$('fsBtn').onclick = async () => {
  if (!document.fullscreenElement) {
    try {
      await document.documentElement.requestFullscreen({ navigationUI: 'hide' });
      if (screen.orientation && screen.orientation.lock) {
        if (state.orientation === 'any') {
          if (screen.orientation.unlock) {
            try { screen.orientation.unlock(); } catch (e) {}
          }
        } else {
          screen.orientation.lock(state.orientation).catch(() => {});
        }
      }
    } catch (e) { toast('전체화면 지원 안됨'); }
  } else {
    if (screen.orientation && screen.orientation.unlock) {
      try { screen.orientation.unlock(); } catch (e) {}
    }
    document.exitFullscreen();
  }
};

// ============ RECORDING (MediaRecorder + canvas capture) ============
async function startRecording() {
  if (!('MediaRecorder' in window)) {
    toast('이 브라우저는 영상 녹화를 지원하지 않습니다');
    return;
  }
  try {
    // Render slides to a canvas for capture
    const canvas = document.createElement('canvas');
    const preset = QUALITY_PRESETS[state.quality] || QUALITY_PRESETS['1080p'];
    // 세로 방향이면 가로/세로 스왑 (9:16 출력)
    const isPortrait = state.orientation === 'portrait';
    const W = isPortrait ? preset.h : preset.w;
    const H = isPortrait ? preset.w : preset.h;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    // Hidden offscreen canvas drawing loop
    let rafId;
    const drawLoop = () => {
      const activeSlide = document.querySelector('.slide.active');
      if (activeSlide) {
        const isVideoSlide = activeSlide.classList.contains('is-video');
        const media = activeSlide.querySelector(isVideoSlide ? 'video' : 'img');
        // 미디어 준비 여부 체크 (이미지=complete+naturalWidth, 비디오=readyState>=2+videoWidth)
        const ready = media && (
          isVideoSlide
            ? (media.readyState >= 2 && media.videoWidth > 0)
            : (media.complete && media.naturalWidth > 0)
        );
        if (ready) {
          ctx.fillStyle = '#000';
          ctx.fillRect(0, 0, W, H);

          // Compute current transform from CSS animation if Ken Burns is on (이미지만 해당)
          const cs = window.getComputedStyle(media);
          const matrix = new DOMMatrixReadOnly(cs.transform === 'none' ? 'matrix(1,0,0,1,0,0)' : cs.transform);

          // Fit media into canvas (contain)
          const iw = isVideoSlide ? media.videoWidth : media.naturalWidth;
          const ih = isVideoSlide ? media.videoHeight : media.naturalHeight;
          const scale = Math.min(W / iw, H / ih);
          const dw = iw * scale, dh = ih * scale;
          const dx = (W - dw) / 2, dy = (H - dh) / 2;

          ctx.save();
          ctx.translate(W / 2, H / 2);
          ctx.transform(matrix.a, matrix.b, matrix.c, matrix.d, matrix.e, matrix.f);
          ctx.translate(-W / 2, -H / 2);
          ctx.drawImage(media, dx, dy, dw, dh);
          ctx.restore();

          // Apply opacity for fade transition
          const opacity = parseFloat(cs.opacity || 1);
          if (opacity < 1) {
            ctx.fillStyle = `rgba(0,0,0,${1 - opacity})`;
            ctx.fillRect(0, 0, W, H);
          }
        }
      }
      rafId = requestAnimationFrame(drawLoop);
    };
    drawLoop();

    const stream = canvas.captureStream(30);
    const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
      ? 'video/webm;codecs=vp9'
      : 'video/webm';
    state.mediaRecorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: preset.bitrate });
    state.recordChunks = [];
    state.mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) state.recordChunks.push(e.data); };
    state.mediaRecorder.onstop = () => {
      cancelAnimationFrame(rafId);
      const blob = new Blob(state.recordChunks, { type: 'video/webm' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const orientTag = state.orientation === 'portrait' ? '_v' : '';
      a.download = `slideshow_${state.quality}${orientTag}_${Date.now()}.webm`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      toast('영상 다운로드 완료');
    };
    state.mediaRecorder._rafId = rafId;
    state.mediaRecorder.start();
    state.recording = true;
    $('recBadge').classList.add('on');
    // Force loop off for recording (one pass only)
    state._origLoop = state.loop;
    state.loop = false;
    toast(`녹화 시작 (${state.quality}) — 끝까지 재생됩니다`, 1500);
  } catch (err) {
    toast('녹화 시작 실패: ' + err.message);
    console.error(err);
  }
}

function stopRecording() {
  if (!state.recording) return;
  state.recording = false;
  $('recBadge').classList.remove('on');
  if (state.mediaRecorder && state.mediaRecorder.state !== 'inactive') {
    state.mediaRecorder.stop();
  }
  if (state._origLoop !== undefined) {
    state.loop = state._origLoop;
    delete state._origLoop;
  }
}

// ============ KEYBOARD ============
document.addEventListener('keydown', (e) => {
  if (!$('player').classList.contains('active')) return;
  if (e.key === 'ArrowRight') { pause(); next(); }
  else if (e.key === 'ArrowLeft') { pause(); prev(); }
  else if (e.key === ' ') { e.preventDefault(); state.playing ? pause() : play(); }
  else if (e.key === 'Escape') closePlayer();
  else if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); armDeleteOrConfirm(); }
});

// 두 번 탭 삭제 메커니즘 — 첫 탭: armed (3초 타임아웃), 두 번째 탭: 실제 삭제
function armDeleteOrConfirm() {
  if (state.filteredIndices.length === 0) return;
  const btn = $('deleteBtn');
  if (btn.classList.contains('armed')) {
    // 두 번째 탭 — 실제 삭제
    clearTimeout(deleteArmedTimer);
    btn.classList.remove('armed');
    deleteCurrent();
  } else {
    // 첫 번째 탭 — armed 상태로 진입
    btn.classList.add('armed');
    toast('다시 탭하여 삭제', 2800);
    // 3초 후 자동 해제
    clearTimeout(deleteArmedTimer);
    deleteArmedTimer = setTimeout(() => {
      btn.classList.remove('armed');
    }, 3000);
  }
  resetIdleTimer();
}

$('deleteBtn').onclick = armDeleteOrConfirm;

// 현재 재생 중인 슬라이드를 라이브러리에서 삭제하고 다음으로 진행
function deleteCurrent() {
  if (state.filteredIndices.length === 0) return;

  const wasPlaying = state.playing;
  pause();

  // 원본 인덱스 (state.images 기준)
  const srcIdx = state.filteredIndices[state.index];
  const item = state.images[srcIdx];

  // blob URL 해제 (메모리 누수 방지)
  if (item) {
    try { URL.revokeObjectURL(item.url); } catch (e) {}
    if (item.thumb && item.thumb.startsWith('blob:')) {
      try { URL.revokeObjectURL(item.thumb); } catch (e) {}
    }
  }

  // 현재 슬라이드 DOM에서 미디어 src 비우기 (즉시 메모리 해제)
  const currentSlide = document.querySelectorAll('.slide')[state.index];
  if (currentSlide) {
    currentSlide.querySelectorAll('img, video').forEach(m => {
      if (m.tagName === 'VIDEO') {
        try { m.pause(); } catch (e) {}
        m.removeAttribute('src');
        m.load();
      } else {
        m.removeAttribute('src');
        m.src = '';
      }
    });
  }

  // 원본 배열에서 제거
  state.images.splice(srcIdx, 1);

  // filteredIndices 재계산 (제거된 srcIdx 기준으로 이후 인덱스 -1)
  state.filteredIndices = state.images
    .map((it, i) => ({ it, i }))
    .filter(({ it }) => {
      if (state.playMode === 'images') return it.type === 'image';
      if (state.playMode === 'videos') return it.type === 'video';
      return true;
    })
    .map(({ i }) => i);

  // 모든 슬라이드 삭제됨 → 시작 화면으로 복귀
  if (state.filteredIndices.length === 0) {
    refreshThumbs();
    toast('모든 슬라이드가 삭제되었습니다');
    closePlayer();
    return;
  }

  // DOM 슬라이드 재구성 (간단하게)
  buildSlides();

  // 인덱스 조정 — 마지막이었으면 한 칸 뒤로
  if (state.index >= state.filteredIndices.length) {
    state.index = state.filteredIndices.length - 1;
  }

  showSlide(state.index, true);
  refreshThumbs();
  toast(item && item.type === 'video' ? '동영상 삭제됨' : '이미지 삭제됨', 1200);

  if (wasPlaying) play();
  resetIdleTimer();
}

// ============ Service Worker (offline cache) ============
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'glowfan-slideshow-v1';
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => self.clients.claim());
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.open(CACHE).then(cache =>
          cache.match(e.request).then(cached =>
            cached || fetch(e.request).then(resp => {
              if (e.request.method === 'GET' && resp.ok && e.request.url.startsWith(self.location.origin)) {
                cache.put(e.request, resp.clone());
              }
              return resp;
            }).catch(() => cached)
          )
        )
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}

// Prevent pull-to-refresh
document.addEventListener('touchmove', (e) => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

</script>
</body>
</html>
